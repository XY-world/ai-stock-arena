<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="lobsterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#EE5A24"/>
    </linearGradient>
    <linearGradient id="greenCandle" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00d26a"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#FF6B6B" stroke-width="3"/>
  
  <!-- K线图背景面板 -->
  <rect x="25" y="110" width="150" height="70" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  
  <!-- K线蜡烛图 -->
  <!-- 红色下跌蜡烛 1 -->
  <line x1="40" y1="125" x2="40" y2="165" stroke="#ff4757" stroke-width="1"/>
  <rect x="36" y="130" width="8" height="25" fill="#ff4757"/>
  
  <!-- 绿色上涨蜡烛 2 -->
  <line x1="55" y1="120" x2="55" y2="160" stroke="#00d26a" stroke-width="1"/>
  <rect x="51" y="125" width="8" height="25" fill="url(#greenCandle)"/>
  
  <!-- 红色下跌蜡烛 3 -->
  <line x1="70" y1="130" x2="70" y2="165" stroke="#ff4757" stroke-width="1"/>
  <rect x="66" y="135" width="8" height="20" fill="#ff4757"/>
  
  <!-- 绿色上涨蜡烛 4 -->
  <line x1="85" y1="115" x2="85" y2="155" stroke="#00d26a" stroke-width="1"/>
  <rect x="81" y="120" width="8" height="28" fill="url(#greenCandle)"/>
  
  <!-- 绿色上涨蜡烛 5 (大涨) -->
  <line x1="100" y1="105" x2="100" y2="150" stroke="#00d26a" stroke-width="1"/>
  <rect x="96" y="110" width="8" height="32" fill="url(#greenCandle)"/>
  
  <!-- 绿色上涨蜡烛 6 (继续涨) -->
  <line x1="115" y1="100" x2="115" y2="140" stroke="#00d26a" stroke-width="1"/>
  <rect x="111" y="105" width="8" height="28" fill="url(#greenCandle)"/>
  
  <!-- 涨停标记 -->
  <text x="135" y="115" font-size="10" fill="#00ff88" font-weight="bold">+10%</text>
  <text x="135" y="128" font-size="8" fill="#888">涨停</text>
  
  <!-- 龙虾身体 (位置上移) -->
  <ellipse cx="100" cy="55" rx="30" ry="35" fill="url(#lobsterGrad)"/>
  
  <!-- 龙虾头 -->
  <ellipse cx="100" cy="20" rx="20" ry="15" fill="url(#lobsterGrad)"/>
  
  <!-- 龙虾眼睛 (戴墨镜效果) -->
  <rect x="80" y="12" width="16" height="10" rx="3" fill="#1a1a2e"/>
  <rect x="104" y="12" width="16" height="10" rx="3" fill="#1a1a2e"/>
  <line x1="96" y1="17" x2="104" y2="17" stroke="#1a1a2e" stroke-width="2"/>
  <!-- 墨镜反光 -->
  <line x1="82" y1="14" x2="88" y2="14" stroke="#444" stroke-width="1"/>
  <line x1="106" y1="14" x2="112" y2="14" stroke="#444" stroke-width="1"/>
  
  <!-- 龙虾触须 -->
  <path d="M82 8 Q65 -10 50 -5" stroke="#FF6B6B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M118 8 Q135 -10 150 -5" stroke="#FF6B6B" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 龙虾钳子 (左) - 拿着金币 -->
  <ellipse cx="45" cy="50" rx="15" ry="10" fill="url(#lobsterGrad)" transform="rotate(-20 45 50)"/>
  <ellipse cx="32" cy="42" rx="8" ry="5" fill="url(#lobsterGrad)" transform="rotate(-40 32 42)"/>
  <ellipse cx="35" cy="55" rx="8" ry="5" fill="url(#lobsterGrad)" transform="rotate(20 35 55)"/>
  <!-- 金币 -->
  <circle cx="25" cy="65" r="12" fill="url(#goldGrad)" stroke="#DAA520" stroke-width="1"/>
  <text x="25" y="69" font-size="12" fill="#8B4513" text-anchor="middle" font-weight="bold">$</text>
  
  <!-- 龙虾钳子 (右) - 指向K线 -->
  <ellipse cx="155" cy="50" rx="15" ry="10" fill="url(#lobsterGrad)" transform="rotate(20 155 50)"/>
  <ellipse cx="168" cy="42" rx="8" ry="5" fill="url(#lobsterGrad)" transform="rotate(40 168 42)"/>
  <ellipse cx="165" cy="55" rx="8" ry="5" fill="url(#lobsterGrad)" transform="rotate(-20 165 55)"/>
  
  <!-- 龙虾嘴巴 (微笑) -->
  <path d="M92 28 Q100 34 108 28" stroke="#c0392b" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- 上涨箭头 -->
  <path d="M155 95 L165 80 L160 80 L160 65 L170 65 L170 80 L165 80" fill="#00ff88"/>
  
  <!-- 股票代码装饰 -->
  <text x="45" y="175" font-size="7" fill="#666" font-family="monospace">SH600XXX</text>
</svg>
